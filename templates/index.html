<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Plant Detection — YOLOv9</title>
  <meta name="description" content="Upload images or videos to detect plants using a trained YOLOv9 model." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    /* ── Reset & Base ───────────────────────────────────────────── */
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #0b0f19;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── Header ─────────────────────────────────────────────────── */
    header {
      width: 100%;
      text-align: center;
      padding: 2.5rem 1rem 1.5rem;
      background: linear-gradient(135deg, #0b0f19 0%, #132a13 100%);
    }

    header h1 {
      font-size: 2.2rem;
      font-weight: 700;
      background: linear-gradient(90deg, #4ade80, #22d3ee);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -.5px;
    }

    header p {
      margin-top: .5rem;
      color: #94a3b8;
      font-size: .95rem;
    }

    /* ── Grid ────────────────────────────────────────────────────── */
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2rem;
      width: 100%;
      max-width: 1100px;
      padding: 2rem 1.5rem 3rem;
    }

    @media (max-width: 720px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }

    /* ── Card ────────────────────────────────────────────────────── */
    .card {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      padding: 2rem;
      transition: border-color .3s, box-shadow .3s;
    }

    .card:hover {
      border-color: rgba(74, 222, 128, .35);
      box-shadow: 0 0 30px rgba(74, 222, 128, .08);
    }

    .card h2 {
      font-size: 1.25rem;
      font-weight: 600;
      margin-bottom: 0.2rem;
      color: #f1f5f9;
    }

    .card .subtitle {
      font-size: .82rem;
      color: #64748b;
      margin-bottom: 1.5rem;
    }

    /* ── Form elements ──────────────────────────────────────────── */
    .file-label {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: .6rem;
      padding: 1rem;
      border: 2px dashed rgba(255, 255, 255, .12);
      border-radius: 12px;
      cursor: pointer;
      font-size: .9rem;
      color: #94a3b8;
      transition: border-color .25s, background .25s;
    }

    .file-label:hover {
      border-color: #4ade80;
      background: rgba(74, 222, 128, .06);
    }

    .file-label svg {
      flex-shrink: 0;
    }

    .file-label input {
      display: none;
    }

    .file-name {
      margin-top: .6rem;
      font-size: .8rem;
      color: #64748b;
      min-height: 1.2em;
      text-align: center;
      word-break: break-all;
    }

    button[type="submit"] {
      margin-top: 1.2rem;
      width: 100%;
      padding: .85rem;
      border: none;
      border-radius: 10px;
      font-family: inherit;
      font-size: .95rem;
      font-weight: 600;
      cursor: pointer;
      color: #0b0f19;
      background: linear-gradient(135deg, #4ade80, #22d3ee);
      transition: opacity .2s, transform .15s;
    }

    button[type="submit"]:hover {
      opacity: .9;
      transform: translateY(-1px);
    }

    button[type="submit"]:active {
      transform: translateY(0);
    }

    button[type="submit"]:disabled {
      opacity: .45;
      cursor: not-allowed;
      transform: none;
    }

    /* ── Result Area ────────────────────────────────────────────── */
    .result {
      margin-top: 1.5rem;
      text-align: center;
    }

    .result img {
      display: block;
      width: 100%;
      max-width: 100%;
      border-radius: 10px;
      margin-top: .6rem;
      border: 1px solid rgba(255, 255, 255, .08);
    }

    .badge {
      display: inline-block;
      padding: .3rem .85rem;
      border-radius: 20px;
      font-size: .8rem;
      font-weight: 600;
      background: rgba(74, 222, 128, .15);
      color: #4ade80;
    }

    /* ── Spinner ─────────────────────────────────────────────────── */
    .spinner {
      display: none;
      margin: 1.2rem auto 0;
      width: 36px;
      height: 36px;
      border: 3px solid rgba(255, 255, 255, .1);
      border-top-color: #4ade80;
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }

    .spinner.active {
      display: block;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* ── Footer ──────────────────────────────────────────────────── */
    footer {
      text-align: center;
      padding: 1rem;
      font-size: .75rem;
      color: #475569;
    }
  </style>
</head>

<body>

  <!-- ─── Header ─────────────────────────────────────────────── -->
  <header>
    <h1>🌿 Plant Detection</h1>
    <p>Upload an image or video to detect plants using YOLOv9</p>
  </header>

  <!-- ─── Grid ───────────────────────────────────────────────── -->
  <div class="grid">

    <!-- ── Image Card ──────────────────────────────────────── -->
    <div class="card" id="image-card">
      <h2>Upload Image</h2>
      <p class="subtitle">JPG, PNG — max 200 MB</p>

      <form id="image-form" enctype="multipart/form-data">
        <label class="file-label" id="img-label">
          <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="none" stroke="currentColor"
            stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
            <rect x="3" y="3" width="18" height="18" rx="2" />
            <circle cx="8.5" cy="8.5" r="1.5" />
            <path d="m21 15-5-5L5 21" />
          </svg>
          <span>Browse image…</span>
          <input type="file" name="file" accept="image/*" id="img-input" />
        </label>
        <p class="file-name" id="img-file-name"></p>
        <button type="submit" id="img-btn" disabled>Detect Plants</button>
      </form>

      <div class="spinner" id="img-spinner"></div>
      <div class="result" id="img-result"></div>
    </div>

    <!-- ── Video Card ──────────────────────────────────────── -->
    <div class="card" id="video-card">
      <h2>Upload Video</h2>
      <p class="subtitle">MP4, AVI, MOV — max 200 MB</p>

      <form id="video-form" enctype="multipart/form-data">
        <label class="file-label" id="vid-label">
          <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="none" stroke="currentColor"
            stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
            <polygon points="23 7 16 12 23 17 23 7" />
            <rect x="1" y="5" width="15" height="14" rx="2" />
          </svg>
          <span>Browse video…</span>
          <input type="file" name="file" accept="video/*" id="vid-input" />
        </label>
        <p class="file-name" id="vid-file-name"></p>
        <button type="submit" id="vid-btn" disabled>Detect Plants</button>
      </form>

      <div class="spinner" id="vid-spinner"></div>
      <div class="result" id="vid-result"></div>
    </div>

  </div>

  <footer>Plant Detection System — YOLOv9 &middot; Powered by Flask &amp; OpenCV</footer>

  <!-- ─── Script ─────────────────────────────────────────────── -->
  <script>
    // Show filename when file selected & enable button
    function bindInput(inputId, nameId, btnId) {
      const input = document.getElementById(inputId);
      const nameEl = document.getElementById(nameId);
      const btn = document.getElementById(btnId);
      input.addEventListener("change", () => {
        if (input.files.length) {
          nameEl.textContent = input.files[0].name;
          btn.disabled = false;
        } else {
          nameEl.textContent = "";
          btn.disabled = true;
        }
      });
    }
    bindInput("img-input", "img-file-name", "img-btn");
    bindInput("vid-input", "vid-file-name", "vid-btn");

    async function handleUpload(formId, url, spinnerId, resultId, type) {
      const form = document.getElementById(formId);
      const spinner = document.getElementById(spinnerId);
      const resultDiv = document.getElementById(resultId);

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        resultDiv.innerHTML = "";
        spinner.classList.add("active");

        try {
          const formData = new FormData(form);
          const res = await fetch(url, {
            method: "POST",
            body: formData,
          });

          const json = await res.json();
          console.log("Upload response:", json);

          if (!res.ok || json.error) {
            const message = json?.error || "Server error";
            resultDiv.innerHTML = `<p style="color:#f87171">${message}</p>`;
            spinner.classList.remove("active");
            return;
          }

          const badge = `<span class="badge">🌱 ${json.detections} detection${json.detections !== 1 ? "s" : ""}</span>`;

          if (type === "image") {
            resultDiv.innerHTML = badge + `<br><img src="${json.output_url}?t=${Date.now()}" alt="Detected plants" />`;
          } else {
            // Video: show success message with download button
            resultDiv.innerHTML = `
              ${badge}
              <div style="margin-top: 1.2rem; padding: 1rem; background: rgba(74, 222, 128, 0.08); border: 1px solid rgba(74, 222, 128, 0.2); border-radius: 10px;">
                <p style="color: #4ade80; font-weight: 600; margin-bottom: 0.8rem;">✅ Video processed successfully</p>
                <p style="color: #94a3b8; margin-bottom: 1rem;">Detections Found: <span style="color: #4ade80; font-weight: 600;">${json.detections}</span></p>
                <a href="${json.output_url}" download style="background: linear-gradient(135deg, #4ade80, #22d3ee); border-radius: 10px; padding: 12px 20px; font-weight: 600; text-decoration: none; display: inline-block; color: #0b0f19; transition: opacity 0.2s; cursor: pointer;" onmouseover="this.style.opacity='0.9'" onmouseout="this.style.opacity='1'">
                  ⬇ Download Processed Video
                </a>
              </div>
            `;
          }

          spinner.classList.remove("active");
        } catch (err) {
          console.error("Upload error:", err);
          resultDiv.innerHTML = `<p style="color:#f87171">Upload failed — ${err.message}</p>`;
          spinner.classList.remove("active");
        }
      });
    }

    handleUpload("image-form", "/upload_image", "img-spinner", "img-result", "image");
    handleUpload("video-form", "/upload_video", "vid-spinner", "vid-result", "video");
  </script>
</body>

</html>
